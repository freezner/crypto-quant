<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪙 크립토 퀀트 - 실시간 시세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #00c853;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }
        
        /* 테이블 컨테이너 */
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: rgba(255,255,255,0.05);
        }
        
        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th.center { text-align: center; }
        th.right { text-align: right; }
        
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        td {
            padding: 16px 20px;
            font-size: 0.95rem;
        }
        
        td.center { text-align: center; }
        td.right { text-align: right; }
        
        /* 코인 심볼 */
        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .coin-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        
        .coin-name {
            font-weight: 700;
            font-size: 1rem;
        }
        
        /* 거래소 뱃지 */
        .exchange-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .exchange-badge.upbit { background: #093687; }
        .exchange-badge.bithumb { background: #f37321; }
        .exchange-badge.coinone { background: #0066ff; }
        
        /* 가격 */
        .price {
            font-weight: 700;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 1rem;
        }
        
        .price.flash-up {
            animation: flashUp 0.3s ease;
        }
        
        .price.flash-down {
            animation: flashDown 0.3s ease;
        }
        
        @keyframes flashUp {
            0% { color: #fff; }
            50% { color: #00c853; background: rgba(0,200,83,0.2); }
            100% { color: #fff; }
        }
        
        @keyframes flashDown {
            0% { color: #fff; }
            50% { color: #ff4444; background: rgba(255,68,68,0.2); }
            100% { color: #fff; }
        }
        
        /* 변동률 */
        .change {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .change.positive { color: #00c853; }
        .change.negative { color: #ff4444; }
        
        /* 업데이트 시간 */
        .updated {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .table-container {
                border-radius: 0;
                margin: 0 -20px;
            }
            
            th, td {
                padding: 12px 10px;
            }
            
            .coin-icon {
                display: none;
            }
            
            .price {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪙 크립토 퀀트 - 실시간 시세</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">연결 중...</span>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="updateCount">0</div>
                <div class="stat-label">업데이트</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="priceCount">0</div>
                <div class="stat-label">시세</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="latency">-</div>
                <div class="stat-label">지연(ms)</div>
            </div>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>코인</th>
                    <th class="center">거래소</th>
                    <th class="right">현재가</th>
                    <th class="right">변동률</th>
                    <th class="center">업데이트</th>
                </tr>
            </thead>
            <tbody id="priceTable">
                <!-- 가격 행이 여기에 동적으로 추가됨 -->
            </tbody>
        </table>
    </div>
    
    <div class="footer">
        <p>WebSocket 실시간 연결</p>
        <p id="lastUpdate">-</p>
    </div>

    <script>
        // 상태 관리
        const state = {
            prices: {},          // key: symbol-exchange
            updateCount: 0,
            ws: null,
            reconnectAttempts: 0,
            maxReconnectAttempts: 10,
        };
        
        // DOM 요소
        const elements = {
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            priceTable: document.getElementById('priceTable'),
            updateCount: document.getElementById('updateCount'),
            priceCount: document.getElementById('priceCount'),
            latency: document.getElementById('latency'),
            lastUpdate: document.getElementById('lastUpdate'),
        };
        
        // 코인 아이콘 (첫 글자)
        const coinIcons = {
            'BTC': '₿',
            'ETH': 'Ξ',
            'XRP': '✕',
            'SOL': '◎',
            'DOGE': 'Ð',
        };
        
        // 가격 포맷
        function formatPrice(price) {
            if (price >= 100000000) {
                return (price / 100000000).toFixed(2) + '억';
            }
            return '₩' + price.toLocaleString('ko-KR', { maximumFractionDigits: 0 });
        }
        
        // 행 생성/업데이트
        function updatePriceRow(symbol, exchange, priceData) {
            const rowId = `row-${symbol}-${exchange}`;
            let row = document.getElementById(rowId);
            
            const price = priceData.price;
            const changePct = priceData.change_pct;
            const changeClass = changePct >= 0 ? 'positive' : 'negative';
            const changeStr = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
            const icon = coinIcons[symbol] || symbol.charAt(0);
            const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if (!row) {
                // 새 행 생성
                row = document.createElement('tr');
                row.id = rowId;
                row.dataset.symbol = symbol;
                row.dataset.exchange = exchange;
                row.innerHTML = `
                    <td>
                        <div class="coin-info">
                            <div class="coin-icon">${icon}</div>
                            <span class="coin-name">${symbol}</span>
                        </div>
                    </td>
                    <td class="center">
                        <span class="exchange-badge ${exchange}">${exchange.toUpperCase()}</span>
                    </td>
                    <td class="right">
                        <span class="price" id="price-${rowId}">${formatPrice(price)}</span>
                    </td>
                    <td class="right">
                        <span class="change ${changeClass}" id="change-${rowId}">${changeStr}</span>
                    </td>
                    <td class="center">
                        <span class="updated" id="updated-${rowId}">${now}</span>
                    </td>
                `;
                
                // 정렬: 심볼 → 거래소 순
                insertRowSorted(row);
            } else {
                // 기존 행 업데이트
                const priceEl = document.getElementById(`price-${rowId}`);
                const changeEl = document.getElementById(`change-${rowId}`);
                const updatedEl = document.getElementById(`updated-${rowId}`);
                
                const oldPrice = parseFloat(priceEl.dataset.price) || 0;
                
                // 플래시 효과
                if (oldPrice > 0 && price !== oldPrice) {
                    priceEl.classList.remove('flash-up', 'flash-down');
                    void priceEl.offsetWidth; // reflow
                    priceEl.classList.add(price > oldPrice ? 'flash-up' : 'flash-down');
                }
                
                priceEl.textContent = formatPrice(price);
                priceEl.dataset.price = price;
                
                changeEl.textContent = changeStr;
                changeEl.className = `change ${changeClass}`;
                
                updatedEl.textContent = now;
            }
            
            // 상태 저장
            const key = `${symbol}-${exchange}`;
            state.prices[key] = priceData;
        }
        
        // 정렬된 위치에 행 삽입
        function insertRowSorted(newRow) {
            const rows = elements.priceTable.querySelectorAll('tr');
            const newSymbol = newRow.dataset.symbol;
            const newExchange = newRow.dataset.exchange;
            
            for (const row of rows) {
                const symbol = row.dataset.symbol;
                const exchange = row.dataset.exchange;
                
                // 심볼 순 → 거래소 순
                if (newSymbol < symbol || (newSymbol === symbol && newExchange < exchange)) {
                    elements.priceTable.insertBefore(newRow, row);
                    return;
                }
            }
            
            elements.priceTable.appendChild(newRow);
        }
        
        // WebSocket 연결
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/prices`;
            
            console.log('[WS] 연결 시도:', wsUrl);
            
            state.ws = new WebSocket(wsUrl);
            
            state.ws.onopen = () => {
                console.log('[WS] 연결됨');
                elements.statusDot.classList.add('connected');
                elements.statusText.textContent = '실시간 연결됨';
                state.reconnectAttempts = 0;
            };
            
            state.ws.onclose = () => {
                console.log('[WS] 연결 끊김');
                elements.statusDot.classList.remove('connected');
                elements.statusText.textContent = '연결 끊김';
                
                // 재연결
                if (state.reconnectAttempts < state.maxReconnectAttempts) {
                    state.reconnectAttempts++;
                    const delay = Math.min(1000 * state.reconnectAttempts, 10000);
                    elements.statusText.textContent = `재연결 중... (${state.reconnectAttempts})`;
                    setTimeout(connect, delay);
                }
            };
            
            state.ws.onerror = (error) => {
                console.error('[WS] 오류:', error);
            };
            
            state.ws.onmessage = (event) => {
                const startTime = performance.now();
                
                try {
                    const message = JSON.parse(event.data);
                    
                    if (message.type === 'initial' || message.type === 'price_update') {
                        const prices = message.data || [];
                        
                        prices.forEach(item => {
                            const { symbol, exchange, price, change_pct, timestamp } = item;
                            updatePriceRow(symbol, exchange, { price, change_pct, timestamp });
                        });
                        
                        state.updateCount++;
                        elements.updateCount.textContent = state.updateCount.toLocaleString();
                        elements.priceCount.textContent = Object.keys(state.prices).length;
                    }
                    
                    // 지연 시간 계산
                    const latency = Math.round(performance.now() - startTime);
                    elements.latency.textContent = latency;
                    
                    // 마지막 업데이트 시간
                    elements.lastUpdate.textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
                    
                } catch (e) {
                    console.error('[WS] 메시지 파싱 오류:', e);
                }
            };
        }
        
        // Ping 유지
        setInterval(() => {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send('ping');
            }
        }, 25000);
        
        // 시작
        connect();
    </script>
</body>
</html>
