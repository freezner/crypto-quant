<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪙 크립토 퀀트 - 실시간 시세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #00c853;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }
        
        /* 메인 컨테이너 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 코인 카드 */
        .coin-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        /* 코인 헤더 */
        .coin-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .coin-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .coin-icon.btc { background: linear-gradient(135deg, #f7931a, #ffab40); }
        .coin-icon.eth { background: linear-gradient(135deg, #627eea, #8c9eff); }
        .coin-icon.xrp { background: linear-gradient(135deg, #00aae4, #00e5ff); }
        .coin-icon.sol { background: linear-gradient(135deg, #9945ff, #14f195); }
        .coin-icon.doge { background: linear-gradient(135deg, #c3a634, #ffd54f); }
        
        .coin-title {
            flex: 1;
        }
        
        .coin-name {
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .coin-fullname {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        .coin-best {
            text-align: right;
        }
        
        .coin-best-price {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        .coin-best-change {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .coin-best-change.positive { color: #00c853; }
        .coin-best-change.negative { color: #ff4444; }
        
        /* 거래소 그리드 */
        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(255,255,255,0.05);
        }
        
        .exchange-cell {
            background: rgba(22, 33, 62, 0.8);
            padding: 16px 20px;
            transition: background 0.2s;
        }
        
        .exchange-cell:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .exchange-name {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .exchange-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .exchange-badge.upbit { background: #093687; }
        .exchange-badge.bithumb { background: #f37321; }
        .exchange-badge.coinone { background: #0066ff; }
        
        .exchange-updated {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        
        .exchange-price {
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'SF Mono', Monaco, monospace;
            margin-bottom: 4px;
        }
        
        .exchange-price.flash-up {
            animation: flashUp 0.3s ease;
        }
        
        .exchange-price.flash-down {
            animation: flashDown 0.3s ease;
        }
        
        @keyframes flashUp {
            0% { color: #fff; }
            50% { color: #00c853; background: rgba(0,200,83,0.2); }
            100% { color: #fff; }
        }
        
        @keyframes flashDown {
            0% { color: #fff; }
            50% { color: #ff4444; background: rgba(255,68,68,0.2); }
            100% { color: #fff; }
        }
        
        .exchange-change {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .exchange-change.positive { color: #00c853; }
        .exchange-change.negative { color: #ff4444; }
        
        .exchange-cell.no-data {
            opacity: 0.3;
        }
        
        .exchange-cell.no-data .exchange-price {
            color: rgba(255,255,255,0.3);
        }
        
        /* 프리미엄 표시 */
        .premium-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        
        .premium-tag.high { background: rgba(255,68,68,0.3); color: #ff6b6b; }
        .premium-tag.low { background: rgba(0,200,83,0.3); color: #69f0ae; }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .exchange-grid {
                grid-template-columns: 1fr;
            }
            
            .coin-header {
                padding: 16px;
            }
            
            .coin-icon {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            
            .coin-name {
                font-size: 1.2rem;
            }
            
            .coin-best-price {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪙 크립토 퀀트 - 실시간 시세</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">연결 중...</span>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="updateCount">0</div>
                <div class="stat-label">업데이트</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="coinCount">0</div>
                <div class="stat-label">코인</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="latency">-</div>
                <div class="stat-label">지연(ms)</div>
            </div>
        </div>
    </div>
    
    <div class="container" id="priceContainer">
        <!-- 코인 카드가 여기에 동적으로 추가됨 -->
    </div>
    
    <div class="footer">
        <p>WebSocket 실시간 연결</p>
        <p id="lastUpdate">-</p>
    </div>

    <script>
        // 코인 정보
        const COINS = {
            'BTC': { name: '비트코인', icon: '₿' },
            'ETH': { name: '이더리움', icon: 'Ξ' },
            'XRP': { name: '리플', icon: '✕' },
            'SOL': { name: '솔라나', icon: '◎' },
            'DOGE': { name: '도지코인', icon: 'Ð' },
        };
        
        const EXCHANGES = ['upbit', 'bithumb', 'coinone'];
        
        // 상태 관리
        const state = {
            prices: {},          // symbol -> { exchange -> priceData }
            updateCount: 0,
            ws: null,
            reconnectAttempts: 0,
            maxReconnectAttempts: 10,
        };
        
        // DOM 요소
        const elements = {
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            priceContainer: document.getElementById('priceContainer'),
            updateCount: document.getElementById('updateCount'),
            coinCount: document.getElementById('coinCount'),
            latency: document.getElementById('latency'),
            lastUpdate: document.getElementById('lastUpdate'),
        };
        
        // 가격 포맷
        function formatPrice(price) {
            if (price >= 100000000) {
                return (price / 100000000).toFixed(2) + '억';
            }
            return '₩' + price.toLocaleString('ko-KR', { maximumFractionDigits: 0 });
        }
        
        // 코인 카드 생성
        function createCoinCard(symbol) {
            const coinInfo = COINS[symbol] || { name: symbol, icon: symbol.charAt(0) };
            
            const card = document.createElement('div');
            card.id = `coin-${symbol}`;
            card.className = 'coin-card';
            
            card.innerHTML = `
                <div class="coin-header">
                    <div class="coin-icon ${symbol.toLowerCase()}">${coinInfo.icon}</div>
                    <div class="coin-title">
                        <div class="coin-name">${symbol}</div>
                        <div class="coin-fullname">${coinInfo.name}</div>
                    </div>
                    <div class="coin-best">
                        <div class="coin-best-price" id="best-price-${symbol}">-</div>
                        <div class="coin-best-change" id="best-change-${symbol}">-</div>
                    </div>
                </div>
                <div class="exchange-grid">
                    ${EXCHANGES.map(ex => `
                        <div class="exchange-cell no-data" id="cell-${symbol}-${ex}">
                            <div class="exchange-name">
                                <span class="exchange-badge ${ex}">${ex.toUpperCase()}</span>
                                <span class="exchange-updated" id="updated-${symbol}-${ex}">-</span>
                            </div>
                            <div class="exchange-price" id="price-${symbol}-${ex}">-</div>
                            <div class="exchange-change" id="change-${symbol}-${ex}">-</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            elements.priceContainer.appendChild(card);
            return card;
        }
        
        // 가격 업데이트
        function updatePrice(symbol, exchange, priceData) {
            // 코인 카드 없으면 생성
            if (!document.getElementById(`coin-${symbol}`)) {
                createCoinCard(symbol);
            }
            
            // 상태 저장
            if (!state.prices[symbol]) {
                state.prices[symbol] = {};
            }
            state.prices[symbol][exchange] = priceData;
            
            // 셀 업데이트
            const cell = document.getElementById(`cell-${symbol}-${exchange}`);
            const priceEl = document.getElementById(`price-${symbol}-${exchange}`);
            const changeEl = document.getElementById(`change-${symbol}-${exchange}`);
            const updatedEl = document.getElementById(`updated-${symbol}-${exchange}`);
            
            if (!cell) return;
            
            cell.classList.remove('no-data');
            
            const oldPrice = parseFloat(priceEl.dataset.price) || 0;
            const newPrice = priceData.price;
            
            // 플래시 효과
            if (oldPrice > 0 && newPrice !== oldPrice) {
                priceEl.classList.remove('flash-up', 'flash-down');
                void priceEl.offsetWidth;
                priceEl.classList.add(newPrice > oldPrice ? 'flash-up' : 'flash-down');
            }
            
            priceEl.textContent = formatPrice(newPrice);
            priceEl.dataset.price = newPrice;
            
            const changePct = priceData.change_pct;
            const changeStr = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
            changeEl.textContent = changeStr;
            changeEl.className = `exchange-change ${changePct >= 0 ? 'positive' : 'negative'}`;
            
            const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            updatedEl.textContent = now;
            
            // 최고가 업데이트
            updateBestPrice(symbol);
        }
        
        // 최고가 업데이트
        function updateBestPrice(symbol) {
            const prices = state.prices[symbol];
            if (!prices) return;
            
            let bestPrice = 0;
            let bestChange = 0;
            
            for (const [ex, data] of Object.entries(prices)) {
                if (data.price > bestPrice) {
                    bestPrice = data.price;
                    bestChange = data.change_pct;
                }
            }
            
            const bestPriceEl = document.getElementById(`best-price-${symbol}`);
            const bestChangeEl = document.getElementById(`best-change-${symbol}`);
            
            if (bestPriceEl) {
                bestPriceEl.textContent = formatPrice(bestPrice);
            }
            
            if (bestChangeEl) {
                const changeStr = (bestChange >= 0 ? '+' : '') + bestChange.toFixed(2) + '%';
                bestChangeEl.textContent = changeStr;
                bestChangeEl.className = `coin-best-change ${bestChange >= 0 ? 'positive' : 'negative'}`;
            }
        }
        
        // WebSocket 연결
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/prices`;
            
            console.log('[WS] 연결 시도:', wsUrl);
            
            state.ws = new WebSocket(wsUrl);
            
            state.ws.onopen = () => {
                console.log('[WS] 연결됨');
                elements.statusDot.classList.add('connected');
                elements.statusText.textContent = '실시간 연결됨';
                state.reconnectAttempts = 0;
            };
            
            state.ws.onclose = () => {
                console.log('[WS] 연결 끊김');
                elements.statusDot.classList.remove('connected');
                elements.statusText.textContent = '연결 끊김';
                
                if (state.reconnectAttempts < state.maxReconnectAttempts) {
                    state.reconnectAttempts++;
                    const delay = Math.min(1000 * state.reconnectAttempts, 10000);
                    elements.statusText.textContent = `재연결 중... (${state.reconnectAttempts})`;
                    setTimeout(connect, delay);
                }
            };
            
            state.ws.onerror = (error) => {
                console.error('[WS] 오류:', error);
            };
            
            state.ws.onmessage = (event) => {
                const startTime = performance.now();
                
                try {
                    const message = JSON.parse(event.data);
                    
                    if (message.type === 'initial' || message.type === 'price_update') {
                        const prices = message.data || [];
                        
                        prices.forEach(item => {
                            const { symbol, exchange, price, change_pct, timestamp } = item;
                            updatePrice(symbol, exchange, { price, change_pct, timestamp });
                        });
                        
                        state.updateCount++;
                        elements.updateCount.textContent = state.updateCount.toLocaleString();
                        elements.coinCount.textContent = Object.keys(state.prices).length;
                    }
                    
                    const latency = Math.round(performance.now() - startTime);
                    elements.latency.textContent = latency;
                    elements.lastUpdate.textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
                    
                } catch (e) {
                    console.error('[WS] 메시지 파싱 오류:', e);
                }
            };
        }
        
        // Ping 유지
        setInterval(() => {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send('ping');
            }
        }, 25000);
        
        // 시작
        connect();
    </script>
</body>
</html>
